<svg width="680" height="500" viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif" role="img">
  <title>Arquitetura da PoC de células multicluster</title>
  <desc>Um cliente faz requisições a um edge router nginx, que roteia por prefixo de path para dois clusters shard, cada um rodando Istio e hospedando uma célula isolada (app + banco de dados). Um cluster master roda o ArgoCD, que lê um repositório git e sincroniza as células nos shards.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect width="680" height="500" fill="#FFFFFF"/>

  <!-- Client -->
  <g>
    <rect x="40" y="56" width="110" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
    <text x="95" y="83" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Cliente</text>
  </g>

  <!-- Edge router -->
  <g>
    <rect x="190" y="50" width="290" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text x="335" y="72" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">Edge router</text>
    <text x="335" y="90" text-anchor="middle" font-size="12" fill="#3C3489">nginx · localhost:8080</text>
  </g>

  <!-- Shard1 container -->
  <rect x="40" y="150" width="270" height="180" rx="20" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="175" y="182" text-anchor="middle" font-size="14" font-weight="500" fill="#04342C">Shard1 cluster</text>
  <text x="175" y="200" text-anchor="middle" font-size="12" fill="#085041">Istio ingress + mesh</text>

  <!-- cell-a -->
  <g>
    <rect x="60" y="220" width="230" height="90" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
    <text x="175" y="254" text-anchor="middle" font-size="14" font-weight="500" fill="#4A1B0C">cell-a</text>
    <text x="175" y="279" text-anchor="middle" font-size="12" fill="#712B13">app + postgres, isolado</text>
  </g>

  <!-- Shard2 container -->
  <rect x="350" y="150" width="270" height="180" rx="20" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="485" y="182" text-anchor="middle" font-size="14" font-weight="500" fill="#04342C">Shard2 cluster</text>
  <text x="485" y="200" text-anchor="middle" font-size="12" fill="#085041">Istio ingress + mesh</text>

  <!-- cell-b -->
  <g>
    <rect x="370" y="220" width="230" height="90" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
    <text x="485" y="254" text-anchor="middle" font-size="14" font-weight="500" fill="#4A1B0C">cell-b</text>
    <text x="485" y="279" text-anchor="middle" font-size="12" fill="#712B13">app + postgres, isolado</text>
  </g>

  <!-- Git repo -->
  <g>
    <rect x="40" y="410" width="130" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
    <text x="105" y="432" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">Git repo</text>
    <text x="105" y="450" text-anchor="middle" font-size="12" fill="#444441">cells + chart</text>
  </g>

  <!-- Master / ArgoCD -->
  <g>
    <rect x="200" y="410" width="290" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text x="345" y="432" text-anchor="middle" font-size="14" font-weight="500" fill="#26215C">ArgoCD</text>
    <text x="345" y="450" text-anchor="middle" font-size="12" fill="#3C3489">master cluster · GitOps</text>
  </g>

  <!-- Arrows -->
  <line x1="150" y1="78" x2="188" y2="78" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="250" y1="106" x2="175" y2="150" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="420" y1="106" x2="485" y2="150" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="170" y1="438" x2="198" y2="438" stroke="#5F5E5A" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="280" y1="410" x2="175" y2="330" stroke="#5F5E5A" stroke-width="1" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
  <line x1="410" y1="410" x2="485" y2="330" stroke="#5F5E5A" stroke-width="1" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
  <text x="345" y="366" text-anchor="middle" font-size="12" fill="#5F5E5A">sync via ArgoCD</text>
</svg>
