apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cells
  namespace: argocd
spec:
  generators:
    - git:
        # >>> EDITE AQUI com a URL do seu repositório git <<<
        repoURL: https://github.com/matheusrdelima/cell-architecture.git
        revision: main
        directories:
          - path: gitops/cells/*
  template:
    metadata:
      name: 'cell-{{path.basename}}'
    spec:
      project: default
      source:
        repoURL: https://github.com/matheusrdelima/cell-architecture.git
        targetRevision: main
        path: gitops/cell-chart
        helm:
          valueFiles:
            - ../cells/{{path.basename}}/values.yaml
      destination:
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
