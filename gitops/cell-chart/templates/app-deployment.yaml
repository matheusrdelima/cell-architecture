apiVersion: apps/v1
kind: Deployment
metadata:
  name: cell-app
  namespace: cell-{{ .Values.cellId }}
  labels:
    app: cell-app
    cell-id: "{{ .Values.cellId }}"
spec:
  replicas: {{ .Values.appReplicas }}
  selector:
    matchLabels:
      app: cell-app
      cell-id: "{{ .Values.cellId }}"
  template:
    metadata:
      labels:
        app: cell-app
        cell-id: "{{ .Values.cellId }}"
    spec:
      containers:
        - name: cell-app
          image: {{ .Values.appImage }}
          command: ["sh", "-c"]
          args:
            - "pip install --quiet flask psycopg2-binary && python /app/app.py"
          ports:
            - containerPort: 8080
          env:
            - name: CELL_ID
              value: "{{ .Values.cellId }}"
            - name: DB_HOST
              value: "cell-db"
            - name: DB_NAME
              value: "{{ .Values.db.name }}"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: cell-db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cell-db-secret
                  key: password
          volumeMounts:
            - name: app-code
              mountPath: /app
      volumes:
        - name: app-code
          configMap:
            name: cell-app-code
