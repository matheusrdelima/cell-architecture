apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cell-db
  namespace: cell-{{ .Values.cellId }}
spec:
  serviceName: cell-db
  replicas: 1
  selector:
    matchLabels:
      app: cell-db
      cell-id: "{{ .Values.cellId }}"
  template:
    metadata:
      labels:
        app: cell-db
        cell-id: "{{ .Values.cellId }}"
    spec:
      containers:
        - name: postgres
          image: {{ .Values.db.image }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "{{ .Values.db.name }}"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: cell-db-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cell-db-secret
                  key: password
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.db.storage }}
